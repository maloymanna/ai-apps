<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; width: 340px; padding: 16px; background: #1a1a1a; color: #e0e0e0; }
  h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: #fff; }
  #url-section { display: none; margin-bottom: 12px; }
  #url-input {
    width: 100%; padding: 8px 10px; border-radius: 6px;
    border: 1px solid #444; background: #2a2a2a; color: #e0e0e0;
    font-size: 13px; outline: none;
  }
  #url-input:focus { border-color: #666; }
  #detected-video { font-size: 12px; color: #aaa; margin-bottom: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  button#summarize-btn {
    width: 100%; padding: 9px; border-radius: 6px; border: none;
    background: #c00; color: #fff; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: background .15s;
  }
  button#summarize-btn:hover:not(:disabled) { background: #e00; }
  button#summarize-btn:disabled { background: #555; cursor: not-allowed; }
  #status-row { display: flex; align-items: flex-start; gap: 8px; margin-top: 12px; min-height: 18px; }
  #status { font-size: 12px; color: #aaa; flex: 1; word-break: break-all; }
  #status.error { color: #f66; }
  #status.success { color: #6f6; }
  #reset-btn {
    display: none; flex-shrink: 0; padding: 2px 7px; font-size: 11px;
    border-radius: 4px; border: 1px solid #555; background: #2a2a2a;
    color: #aaa; cursor: pointer;
  }
  #reset-btn:hover { background: #333; color: #fff; }
  .spinner {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid #555; border-top-color: #aaa;
    border-radius: 50%; animation: spin .7s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<h2>YouTube Summarizer</h2>
<div id="detected-video"></div>
<div id="url-section">
  <input id="url-input" type="text" placeholder="https://youtube.com/watch?v=…" />
</div>
<button id="summarize-btn">Summarize</button>
<div id="status-row">
  <div id="status"></div>
  <button id="reset-btn">clear</button>
</div>
<script src="popup.js"></script>
</body>
</html>
